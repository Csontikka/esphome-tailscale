<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Circuit pattern -->
  <g stroke="#1a3a5c" stroke-width="1" opacity="0.5" fill="none">
    <line x1="0" y1="40" x2="180" y2="40"/><line x1="180" y1="40" x2="200" y2="60"/><line x1="200" y1="60" x2="340" y2="60"/>
    <circle cx="180" cy="40" r="3" fill="#1a3a5c"/><circle cx="340" cy="60" r="3" fill="#1a3a5c"/>
    <line x1="900" y1="35" x2="1060" y2="35"/><line x1="1060" y1="35" x2="1080" y2="55"/><line x1="1080" y1="55" x2="1200" y2="55"/>
    <circle cx="1060" cy="35" r="3" fill="#1a3a5c"/>
    <line x1="0" y1="250" x2="120" y2="250"/><line x1="120" y1="250" x2="140" y2="270"/><line x1="140" y1="270" x2="300" y2="270"/>
    <circle cx="120" cy="250" r="3" fill="#1a3a5c"/>
    <line x1="850" y1="255" x2="1000" y2="255"/>
    <line x1="1150" y1="80" x2="1150" y2="220"/>
  </g>

  <!-- ALT 4: Mesh constellation — 7 peer nodes with interconnecting lines, ESP32 highlighted in gold -->
  <g transform="translate(150, 150)">
    <!-- Connection lines (mesh) -->
    <g stroke="#00b4d8" stroke-width="1.2" fill="none">
      <line x1="0" y1="0" x2="-70" y2="-40" opacity="0.5"/>
      <line x1="0" y1="0" x2="-80" y2="15" opacity="0.5"/>
      <line x1="0" y1="0" x2="-55" y2="55" opacity="0.5"/>
      <line x1="0" y1="0" x2="40" y2="-60" opacity="0.6"/>
      <line x1="0" y1="0" x2="80" y2="-5" opacity="0.6"/>
      <line x1="0" y1="0" x2="60" y2="50" opacity="0.5"/>
      <line x1="-70" y1="-40" x2="40" y2="-60" opacity="0.25"/>
      <line x1="-70" y1="-40" x2="-80" y2="15" opacity="0.3"/>
      <line x1="-80" y1="15" x2="-55" y2="55" opacity="0.3"/>
      <line x1="-55" y1="55" x2="60" y2="50" opacity="0.25"/>
      <line x1="60" y1="50" x2="80" y2="-5" opacity="0.3"/>
      <line x1="80" y1="-5" x2="40" y2="-60" opacity="0.3"/>
    </g>
    <!-- Peer nodes -->
    <g fill="#00b4d8">
      <circle cx="-70" cy="-40" r="8" opacity="0.25"/>
      <circle cx="-70" cy="-40" r="5"/>
      <circle cx="-80" cy="15" r="8" opacity="0.25"/>
      <circle cx="-80" cy="15" r="5"/>
      <circle cx="-55" cy="55" r="8" opacity="0.25"/>
      <circle cx="-55" cy="55" r="5"/>
      <circle cx="40" cy="-60" r="8" opacity="0.25"/>
      <circle cx="40" cy="-60" r="5"/>
      <circle cx="80" cy="-5" r="8" opacity="0.25"/>
      <circle cx="80" cy="-5" r="5"/>
      <circle cx="60" cy="50" r="8" opacity="0.25"/>
      <circle cx="60" cy="50" r="5"/>
    </g>
    <!-- ESP32 node in center (gold highlighted) -->
    <circle cx="0" cy="0" r="24" fill="#daa520" opacity="0.15"/>
    <circle cx="0" cy="0" r="18" fill="url(#gold)" stroke="#ffd700" stroke-width="2"/>
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#0a0f1e"/>
    <text x="0" y="3" font-family="'Arial Black', Arial, sans-serif" font-size="8" font-weight="900" fill="#ffd700" text-anchor="middle">S3</text>
  </g>

  <text x="290" y="140" font-family="'Arial Black', 'Impact', Arial, sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-1">ESPHome</text>
  <text x="290" y="190" font-family="'Arial Black', 'Impact', Arial, sans-serif" font-size="46" font-weight="900" fill="url(#gold)" letter-spacing="6">TAILSCALE</text>

  <line x1="290" y1="205" x2="1080" y2="205" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <text x="685" y="242" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="2">One more peer in your tailnet · No gateway required</text>
</svg>
