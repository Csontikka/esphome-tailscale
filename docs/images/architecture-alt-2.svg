<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <radialGradient id="cloudGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#00b4d8" text-anchor="middle" letter-spacing="2">ARCHITECTURE · TAILNET HUB</text>
  <line x1="400" y1="60" x2="800" y2="60" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>

  <!-- Tailnet cloud in center -->
  <circle cx="600" cy="310" r="200" fill="url(#cloudGlow)"/>
  <g transform="translate(600, 310)">
    <path d="M -160 40 Q -190 40 -190 10 Q -190 -40 -140 -40 Q -120 -80 -60 -80 Q 0 -90 20 -50 Q 80 -50 80 -10 Q 120 -10 120 30 Q 120 60 80 60 L -150 60 Q -190 60 -160 40 Z"
          fill="#0d1b2e" stroke="#00b4d8" stroke-width="2.5" stroke-dasharray="8,4"/>
    <text x="0" y="-10" font-family="'Arial Black', Arial, sans-serif" font-size="32" font-weight="900" fill="#00b4d8" text-anchor="middle" letter-spacing="3">TAILNET</text>
    <text x="0" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8aa9c4" text-anchor="middle">WireGuard mesh · end-to-end encrypted</text>
    <text x="0" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8aa9c4" text-anchor="middle">100.64.0.0/10 CGNAT space</text>
  </g>

  <!-- Nodes around cloud -->
  <!-- ESP32 (top right — "remote site") -->
  <g transform="translate(950, 160)">
    <rect x="-80" y="-42" width="160" height="84" rx="8" fill="#1a3a5c" stroke="#2ea8d8" stroke-width="2"/>
    <text x="0" y="-18" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#00b4d8" text-anchor="middle">ESP32-S3</text>
    <text x="0" y="2" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">(this component)</text>
    <text x="0" y="22" font-family="'Consolas', monospace" font-size="11" fill="url(#gold)" text-anchor="middle">100.64.x.y · cabin</text>
  </g>
  <line x1="880" y1="175" x2="720" y2="240" stroke="#00b4d8" stroke-width="2.5"/>

  <!-- Home Assistant (top left — "home") -->
  <g transform="translate(250, 160)">
    <rect x="-80" y="-42" width="160" height="84" rx="8" fill="#1a3a5c" stroke="#2ea8d8" stroke-width="2"/>
    <text x="0" y="-18" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#00b4d8" text-anchor="middle">Home Assistant</text>
    <text x="0" y="2" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">(Tailscale add-on)</text>
    <text x="0" y="22" font-family="'Consolas', monospace" font-size="11" fill="url(#gold)" text-anchor="middle">100.64.x.z · home</text>
  </g>
  <line x1="320" y1="175" x2="480" y2="240" stroke="#00b4d8" stroke-width="2.5"/>

  <!-- Phone (bottom left) -->
  <g transform="translate(250, 490)">
    <rect x="-64" y="-42" width="128" height="84" rx="8" fill="#1a3a5c" stroke="#2ea8d8" stroke-width="2"/>
    <text x="0" y="-14" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#00b4d8" text-anchor="middle">Phone · HA app</text>
    <text x="0" y="8" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">Tailscale mobile</text>
    <text x="0" y="26" font-family="'Consolas', monospace" font-size="11" fill="url(#gold)" text-anchor="middle">100.64.x.a</text>
  </g>
  <line x1="310" y1="460" x2="480" y2="400" stroke="#00b4d8" stroke-width="2.5"/>

  <!-- Laptop (bottom right) -->
  <g transform="translate(950, 490)">
    <rect x="-64" y="-42" width="128" height="84" rx="8" fill="#1a3a5c" stroke="#2ea8d8" stroke-width="2"/>
    <text x="0" y="-14" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#00b4d8" text-anchor="middle">Laptop · ESPHome</text>
    <text x="0" y="8" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">OTA over tailnet</text>
    <text x="0" y="26" font-family="'Consolas', monospace" font-size="11" fill="url(#gold)" text-anchor="middle">100.64.x.b</text>
  </g>
  <line x1="890" y1="460" x2="720" y2="400" stroke="#00b4d8" stroke-width="2.5"/>

  <!-- Crossed out subnet router (bottom center) -->
  <g transform="translate(600, 540)" opacity="0.6">
    <rect x="-110" y="-18" width="220" height="36" rx="6" fill="none" stroke="#b24545" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="0" y="5" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#b24545" text-anchor="middle">No subnet router needed</text>
    <line x1="-130" y1="-25" x2="130" y2="25" stroke="#b24545" stroke-width="2.5"/>
  </g>
</svg>
