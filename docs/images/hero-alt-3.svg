<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Circuit pattern -->
  <g stroke="#1a3a5c" stroke-width="1" opacity="0.5" fill="none">
    <line x1="0" y1="40" x2="180" y2="40"/><line x1="180" y1="40" x2="200" y2="60"/><line x1="200" y1="60" x2="340" y2="60"/>
    <circle cx="180" cy="40" r="3" fill="#1a3a5c"/><circle cx="340" cy="60" r="3" fill="#1a3a5c"/>
    <line x1="900" y1="35" x2="1060" y2="35"/><line x1="1060" y1="35" x2="1080" y2="55"/><line x1="1080" y1="55" x2="1200" y2="55"/>
    <circle cx="1060" cy="35" r="3" fill="#1a3a5c"/>
    <line x1="0" y1="250" x2="120" y2="250"/><line x1="120" y1="250" x2="140" y2="270"/><line x1="140" y1="270" x2="300" y2="270"/>
    <circle cx="120" cy="250" r="3" fill="#1a3a5c"/>
    <line x1="850" y1="255" x2="1000" y2="255"/><line x1="1000" y1="255" x2="1020" y2="240"/><line x1="1020" y1="240" x2="1200" y2="240"/>
    <circle cx="1000" cy="255" r="3" fill="#1a3a5c"/>
    <line x1="1150" y1="80" x2="1150" y2="220"/><line x1="1120" y1="100" x2="1150" y2="100"/>
    <circle cx="1150" cy="100" r="3" fill="#1a3a5c"/>
    <line x1="50" y1="80" x2="50" y2="130"/>
    <circle cx="50" cy="80" r="3" fill="#1a3a5c"/>
  </g>

  <!-- ALT 3: Gold shield with ESP32 chip inside (security / VPN metaphor) -->
  <g transform="translate(138, 150)">
    <!-- Outer glow behind shield -->
    <circle cx="0" cy="0" r="70" fill="#daa520" opacity="0.1"/>
    <!-- Shield shape -->
    <path d="M 0 -68 L 56 -50 L 56 10 Q 56 44 0 68 Q -56 44 -56 10 L -56 -50 Z"
          fill="url(#gold)" stroke="#ffd700" stroke-width="2"/>
    <!-- Inner dark layer -->
    <path d="M 0 -58 L 46 -42 L 46 8 Q 46 36 0 58 Q -46 36 -46 8 L -46 -42 Z"
          fill="#0d1b2e" stroke="#b8860b" stroke-width="1"/>
    <!-- Chip inside shield -->
    <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#1a6ea8" stroke="#2ea8d8" stroke-width="2"/>
    <rect x="-12" y="-12" width="24" height="24" rx="2" fill="#2ea8d8"/>
    <text x="0" y="5" font-family="'Arial Black', Arial, sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle">S3</text>
    <!-- Pins -->
    <line x1="-10" y1="-18" x2="-10" y2="-26" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-18" x2="0" y2="-26" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-18" x2="10" y2="-26" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="18" x2="-10" y2="26" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="26" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="18" x2="10" y2="26" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="-10" x2="-26" y2="-10" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="-26" y2="0" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="10" x2="-26" y2="10" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="-10" x2="26" y2="-10" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="26" y2="0" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="26" y2="10" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="255" y="140" font-family="'Arial Black', 'Impact', Arial, sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-1">ESPHome</text>
  <text x="255" y="190" font-family="'Arial Black', 'Impact', Arial, sans-serif" font-size="46" font-weight="900" fill="url(#gold)" letter-spacing="6">TAILSCALE</text>

  <line x1="255" y1="205" x2="1050" y2="205" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <text x="650" y="242" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="2">End-to-end encrypted · Zero config · Part of your tailnet</text>
</svg>
