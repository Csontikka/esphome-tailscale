esphome:
  name: esp32-tailscale-dev
  friendly_name: "ESP32 Tailscale SaaS (dev)"

# ---------------------------------------------------------------------------
# Dev config for the official Tailscale SaaS control plane.
# Hostname: esp32-tailscale-dev. Flash this when you want the device to join
# your personal tailnet via controlplane.tailscale.com.
# For the Headscale dev LXC variant, see example-dev-headscale.yaml.
# ---------------------------------------------------------------------------

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LOG_DEFAULT_LEVEL_ERROR: n
      CONFIG_LOG_DEFAULT_LEVEL_INFO: y
      CONFIG_LOG_MAXIMUM_LEVEL_INFO: y
      CONFIG_LWIP_TCPIP_TASK_STACK_SIZE: "6144"
      CONFIG_LWIP_CHECK_THREAD_SAFETY: y
      CONFIG_LWIP_TCPIP_CORE_LOCKING: n

external_components:
  - source: components

time:
  - platform: sntp
    id: tailscale_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

binary_sensor:
  - platform: tailscale
    connected:
      name: "VPN Connected"
    key_expiry_warning:
      name: "VPN Key Expiry Warning"
    ha_connected:
      name: "HA API Connected"
    vpn_auto_rollback:
      name: "VPN Auto-Rollback"

text_sensor:
  - platform: tailscale
    ip_address:
      name: "VPN IP"
    vpn_hostname:
      name: "VPN Hostname"
    memory_mode:
      name: "Device Memory"
    setup_status:
      name: "VPN Setup Hint"
    peer_status:
      name: "VPN Peer Status"
    magicdns:
      name: "VPN MagicDNS"
    network_name:
      name: "VPN Network"
    key_expiry:
      name: "VPN Key Expiry"
    ha_connection_route:
      name: "HA API Connection Route"
    ha_connection_ip:
      name: "HA API Connection IP"
    control_plane:
      name: "VPN Control Plane"
    login_server:
      name: "VPN Login Server"

button:
  - platform: tailscale
    reconnect:
      name: "VPN Reconnect"
  - platform: restart
    name: "Reboot"

sensor:
  - platform: tailscale
    peers_online:
      name: "VPN Peers Online"
    peers_direct:
      name: "VPN Peers Direct"
    peers_derp:
      name: "VPN Peers DERP"
    peers_max:
      name: "VPN Peers Max"
    uptime:
      name: "VPN Uptime"
    connections:
      name: "VPN Connect Count"

switch:
  - platform: tailscale
    vpn_enabled:
      name: "VPN Enabled"

tailscale:
  auth_key: !secret tailscale_auth_key
  hostname: "esp32-tailscale-dev"
  # max_peers: 16  # Optional, default 16
  # login_server omitted -> Tailscale SaaS (controlplane.tailscale.com).

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: "100.x.x.x"  # Set to your Tailscale VPN IP after first boot

logger:
  level: INFO
  baud_rate: 921600
  hardware_uart: UART0
  logs:
    ml_coord: INFO
    ml_noise: INFO
    ml_h2: INFO
    ml_net_io: INFO
    microlink: INFO
    ml_peer_nvs: INFO
    ml_wg_mgr: INFO

api:

web_server:
  port: 80

ota:
  platform: esphome
