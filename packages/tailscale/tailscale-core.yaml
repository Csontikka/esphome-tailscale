# Minimal Tailscale component import — loads the tailscale external
# component plus its dependencies (NTP time, ESP-IDF lwIP tweaks, logger
# baud rate), but does NOT auto-register the diagnostic entities.
#
# Use this variant when you want full control over which Tailscale
# entities appear on the device's web_server / Home Assistant — for
# example, to keep only a small subset alongside your own custom
# sensors and switches. See the regular `tailscale.yaml` package for
# the full-entity import (the recommended default).
#
# Example top-level YAML using this variant:
#
#   esphome:
#     name: my-device
#
#   esp32:
#     board: esp32-s3-devkitc-1
#     framework:
#       type: esp-idf
#
#   packages:
#     tailscale:
#       url: https://github.com/Csontikka/esphome-tailscale
#       ref: main
#       files: [packages/tailscale/tailscale-core.yaml]
#       refresh: 0s
#
#   tailscale:
#     auth_key: !secret tailscale_auth_key
#     hostname: "my-device"
#
#   wifi:
#     ssid: !secret wifi_ssid
#     password: !secret wifi_password
#
#   # Define ONLY the Tailscale entities you want — anything not listed
#   # here will not be registered. Add as few or as many as you like.
#   binary_sensor:
#     - platform: tailscale
#       connected:
#         name: "VPN Connected"
#
#   text_sensor:
#     - platform: tailscale
#       ip_address:
#         name: "VPN IP"
#
#   # Add your own entities the normal ESPHome way — they appear
#   # alongside the (selected) Tailscale ones:
#   switch:
#     - platform: gpio
#       pin: GPIO5
#       name: "My Relay"
#
#   api:
#   ota:
#     platform: esphome

esp32:
  framework:
    sdkconfig_options:
      CONFIG_LWIP_TCPIP_TASK_STACK_SIZE: "6144"
      CONFIG_LWIP_CHECK_THREAD_SAFETY: y
      CONFIG_LWIP_TCPIP_CORE_LOCKING: n

logger:
  baud_rate: 921600

external_components:
  - source:
      type: git
      url: https://github.com/Csontikka/esphome-tailscale.git
      ref: main
    components: [tailscale]
    refresh: 0s

time:
  - platform: sntp
    id: tailscale_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
