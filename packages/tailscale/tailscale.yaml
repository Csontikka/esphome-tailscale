substitutions:
  var_tailscale_max_peers: "16"

tailscale:
  auth_key: ${var_tailscale_auth_key}
  hostname: ${var_tailscale_hostname}
  max_peers: ${var_tailscale_max_peers}
  update_interval: 30s
  configured_ip: ${var_tailscale_ip}

wifi:
  use_address: ${var_tailscale_ip}

binary_sensor:
  - platform: tailscale
    connected:
      name: "Tailscale Connected"

text_sensor:
  - platform: tailscale
    ip_address:
      id: tailscale_ip_sensor
      name: "Tailscale IP"
    tailscale_hostname:
      name: "Tailscale Hostname"
    memory_mode:
      name: "Tailscale Memory"
    setup_status:
      name: "Tailscale Setup Status"
    peer_status:
      name: "Tailscale Peer Status"
    magicdns:
      name: "Tailscale MagicDNS"

sensor:
  - platform: tailscale
    peers_total:
      name: "Tailscale Peers Total"
    peers_online:
      name: "Tailscale Peers Online"
    peers_direct:
      name: "Tailscale Peers Direct"
    peers_derp:
      name: "Tailscale Peers DERP"
    peers_max:
      name: "Tailscale Peers Max"
