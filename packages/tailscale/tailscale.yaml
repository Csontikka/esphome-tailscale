tailscale:
  auth_key: ${var_tailscale_auth_key}
  hostname: ${var_tailscale_hostname}

binary_sensor:
  - platform: tailscale
    connected:
      name: "Tailscale Connected"

text_sensor:
  - platform: tailscale
    ip_address:
      name: "Tailscale IP"
    tailscale_hostname:
      name: "Tailscale Hostname"
    memory_mode:
      name: "Tailscale Memory"

sensor:
  - platform: tailscale
    peer_count:
      name: "Tailscale Peers"
